 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Total Summary</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600 text-center">
            <h1 class="text-3xl font-black text-blue-900 mb-6 italic uppercase">HEPM-TECH</h1>
            <input type="password" id="passInput" placeholder="Password: Girmay2026" class="w-full p-4 border-2 rounded-xl mb-4 text-center font-bold outline-none">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all uppercase">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-900 p-5 text-white flex justify-between items-center shadow-lg">
            <h2 class="text-xl font-black italic uppercase">🚀 HEPM-TECH LIVE</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-6">
            <div class="grid gap-4 grid-cols-1 md:grid-cols-3 mb-10">
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-blue-500 text-center">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Debt (B)</p>
                    <h2 id="debtSum" class="text-3xl font-black text-blue-900">€0,00</h2>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-green-500 text-center">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Repair (C)</p>
                    <h2 id="repairSum" class="text-3xl font-black text-green-600">€0,00</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl shadow-xl border-b-8 border-yellow-400 text-center">
                    <p class="text-[10px] font-black uppercase text-yellow-500 italic">Grand Total (B+C)</p>
                    <h2 id="grandSum" class="text-4xl font-black text-white font-mono">€0,00</h2>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden">
                <div class="bg-blue-700 p-5 flex justify-between items-center">
                    <h3 class="text-white font-black uppercase text-xs italic">Live Register</h3>
                    <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="Search Name..." class="p-2 rounded-lg text-sm outline-none font-bold">
                </div>
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-100 text-[10px] uppercase font-black text-slate-500">
                            <th class="p-4">Name</th>
                            <th class="p-4 text-right">Debt</th>
                            <th class="p-4 text-right">Repair</th>
                            <th class="p-4 text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="font-bold text-sm italic divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT05rM698Fulyxz7luxuGeJ5b_9-NN9AYJ8KoXLL2rjYnRSnnB3S83XLCGx2noeQA3RpyGAXILK1ZiI/pub?output=csv';

        function checkPass() {
            if(document.getElementById('passInput').value === "Girmay2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchData();
            } else { alert("Wrong Password!"); }
        }

        function cleanNum(txt) {
            if(!txt) return 0;
            let c = txt.replace(/"/g, '').replace('€', '').trim();
            c = c.replace(/\./g, '').replace(',', '.');
            return parseFloat(c) || 0;
        }

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';

                let dTotal = 0, rTotal = 0;

                rows.forEach((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        if(name.toLowerCase() === "name" || !name) return;

                        const debt = cleanNum(cols[1]);
                        const repair = cleanNum(cols[2]);
                        const phone = cols[3] ? cols[3].replace(/"/g, '').trim() : "";
                        const email = cols[4] ? cols[4].replace(/"/g, '').trim() : "";

                        dTotal += debt;
                        rTotal += repair;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="p-4 uppercase text-slate-700 font-black">${name}</td>
                            <td class="p-4 text-right text-slate-500">€${debt.toLocaleString('de-DE')}</td>
                            <td class="p-4 text-right text-green-600">€${repair.toLocaleString('de-DE')}</td>
                            <td class="p-4 text-center">
                                ${phone ? `<a href="tel:${phone}" class="text-blue-500 mr-2 text-xs">📞</a>` : ''}
                                ${email ? `<a href="mailto:${email}" class="text-blue-500 text-xs">📧</a>` : ''}
                            </td>
                        `;
                        tbody.appendChild(tr);
                    }
                });

                document.getElementById('debtSum').innerText = `€${dTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('repairSum').innerText = `€${rTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('grandSum').innerText = `€${(dTotal + rTotal).toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
            } catch (e) { console.error(e); }
        }

        function searchNames() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let text = td.textContent || td.innerText;
                    tr[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
