 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Uxbridge Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="bg-yellow-400 text-black py-3 text-center sticky top-0 z-[100] border-b-2 border-black">
        <p class="font-black uppercase italic tracking-tighter text-[10px]">
            ⚠️ NOTICE: Delivering in UXBRIDGE Only (Within 10 Miles)
        </p>
    </div>

    <nav class="bg-white shadow-sm sticky top-[42px] z-50 p-4 border-b flex justify-between items-center">
        <h1 class="text-xl font-black italic text-slate-800 tracking-tighter">HEPM-TECH</h1>
        <div class="flex items-center gap-2 text-green-500 font-black text-[9px] uppercase">
            <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span> Open
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
            <h2 id="modalTitle" class="text-2xl font-black text-slate-800 mb-1 uppercase italic tracking-tighter"></h2>
            <p class="text-blue-600 font-bold mb-6 text-[10px] bg-blue-50 px-3 py-1 rounded-full inline-block italic">Select Weight & Details</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[9px] font-black uppercase text-slate-400 ml-2">Weight/Quantity Selection</label>
                    <select id="weightSelect" class="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-slate-100 outline-none focus:border-blue-500 appearance-none">
                        </select>
                </div>

                <input type="text" id="custName" placeholder="Full Name (ስም)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-500">
                <input type="tel" id="custPhone" placeholder="Phone Number (ቁጽሪ ስልኪ)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                <textarea id="custLoc" placeholder="Uxbridge Address (ኣድራሻ)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold h-24 resize-none"></textarea>
                
                <button onclick="confirmAndSend()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black shadow-xl hover:bg-blue-600 transition-all uppercase tracking-tighter">
                    Order via WhatsApp <i class="fab fa-whatsapp ml-2 text-green-400"></i>
                </button>
                <button onclick="closeModal()" class="w-full text-slate-300 font-bold text-[10px] uppercase mt-2">Go Back</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?output=csv';
        const MY_PHONE = "447448700978";
        let currentProduct = {};

        const MENU_DATA = {
            "rs11": ["3.5g - £40", "7g - £70", "14g - £130"],
            "candy": ["3.5g - £30", "7g - £55", "14g - £110"],
            "shenron": ["3.5g - £30", "7g - £60", "14g - £120"],
            "gelato": ["3.5g - £25", "7g - £50", "14g - £100"],
            "drysift": ["1g - £15", "2g - £25", "3g - £35", "4g - £40"],
            "triple": ["1g - £10", "2g - £20", "3.5g - £30"]
        };

        async function loadShop() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const img = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        if(!name) return;

                        const card = document.createElement('div');
                        card.className = "bg-white rounded-[2rem] border border-slate-100 p-2 flex flex-col shadow-sm hover:shadow-md transition-all";
                        card.innerHTML = `
                            <div class="h-44 md:h-64 overflow-hidden rounded-[1.8rem] bg-slate-100 mb-3">
                                <img src="${img}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=${name}'">
                            </div>
                            <div class="p-2 text-center flex-grow flex flex-col">
                                <h3 class="text-[10px] font-black uppercase text-slate-700 mb-2 h-8 overflow-hidden tracking-tighter">${name}</h3>
                                <button onclick="openModal('${name}')" class="mt-auto w-full bg-slate-900 text-white py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest shadow-lg">Order</button>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (err) { console.error(err); }
        }

        function openModal(name) {
            currentProduct = { name };
            document.getElementById('modalTitle').innerText = name;
            const select = document.getElementById('weightSelect');
            select.innerHTML = '';

            let key = "";
            const n = name.toLowerCase();
            if(n.includes('rs11') || n.includes('rs 11')) key = "rs11";
            else if(n.includes('candy')) key = "candy";
            else if(n.includes('shenron')) key = "shenron";
            else if(n.includes('gelato')) key = "gelato";
            else if(n.includes('drysift')) key = "drysift";
            else if(n.includes('triple')) key = "triple";

            if(key && MENU_DATA[key]) {
                MENU_DATA[key].forEach(opt => {
                    const o = document.createElement('option');
                    o.text = opt; o.value = opt;
                    select.add(o);
                });
            } else {
                const o = document.createElement('option');
                o.text = "Standard Order"; o.value = "Standard Order";
                select.add(o);
            }

            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmAndSend() {
            const n = document.getElementById('custName').value.trim();
            const p = document.getElementById('custPhone').value.trim();
            const l = document.getElementById('custLoc').value.trim();
            const w = document.getElementById('weightSelect').value;

            if(!n || !p || !l) { alert("Please fill all details!"); return; }

            const msg = `*NEW UXBRIDGE ORDER* 📍\n--------------------------\n*Product:* ${currentProduct.name}\n*Selection:* ${w}\n\n*Customer Info:* \n👤 Name: ${n}\n📞 Phone: ${p}\n📍 Address: ${l}\n--------------------------`;
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
            closeModal();
        }

        window.onload = loadShop;
    </script>
</body>
</html>
