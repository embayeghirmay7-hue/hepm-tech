 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Ultimate Live Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-20 font-sans text-slate-900">
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600 text-center">
            <h1 class="text-3xl font-black text-blue-900 mb-6 italic uppercase tracking-tighter">HEPM-TECH</h1>
            <input type="password" id="passInput" placeholder="Password: Girmay2026" class="w-full p-4 border-2 rounded-xl mb-4 text-center font-bold outline-none">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all uppercase">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-900 p-5 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <h2 class="text-xl font-black italic uppercase tracking-tighter">🚀 HEPM-TECH LIVE</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <div class="grid gap-4 grid-cols-1 md:grid-cols-3 mb-10 text-center">
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-blue-500">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Debt (B)</p>
                    <h2 id="debtTotalDisplay" class="text-3xl font-black text-blue-900 font-mono italic">€0,00</h2>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-green-500">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Repair (C)</p>
                    <h2 id="repairTotalDisplay" class="text-3xl font-black text-green-600 font-mono italic">€0,00</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl border-b-8 border-yellow-400">
                    <p class="text-[10px] font-black uppercase text-yellow-500 italic">Grand Total (B+C)</p>
                    <h2 id="grandTotalDisplay" class="text-4xl font-black text-white font-mono italic">€0,00</h2>
                </div>
            </div>

            <div class="grid gap-4 grid-cols-1 md:grid-cols-3 mb-10">
                <div class="bg-white p-5 rounded-2xl shadow-md border-t-4 border-orange-500">
                    <h4 class="font-black text-xs uppercase mb-3">EOS (VKB)</h4>
                    <a href="tel:05618002450" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs mb-2">📞 0561 800-2450</a>
                    <a href="mailto:service@eos.de" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs">📧 Email EOS</a>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-md border-t-4 border-orange-500">
                    <h4 class="font-black text-xs uppercase mb-3">RIVERTY</h4>
                    <a href="tel:0722150400" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs mb-2">📞 07221 5040-0</a>
                    <a href="mailto:service@riverty.com" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs">📧 Email Riverty</a>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-md border-t-4 border-blue-900">
                    <h4 class="font-black text-xs uppercase mb-3">DEUTSCHE BANK</h4>
                    <a href="tel:06991010000" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs mb-2">📞 069 910-10000</a>
                    <a href="mailto:service@db.com" class="block bg-slate-50 p-2 rounded-lg text-blue-600 font-bold text-xs">📧 Email DB</a>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                <div class="bg-blue-700 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h3 class="text-white font-black uppercase tracking-widest italic text-sm">👥 Live Register & Actions</h3>
                    <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="🔍 Search name..." class="p-3 rounded-xl border-none outline-none w-full md:w-64 font-bold text-slate-800 shadow-inner">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-[10px] font-black uppercase text-slate-500 border-b">
                                <th class="p-5">Name</th>
                                <th class="p-5 text-right">Debt (B)</th>
                                <th class="p-5 text-right">Repair (C)</th>
                                <th class="p-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="excelTableBody" class="divide-y divide-slate-100 font-bold italic text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT05rM698Fulyxz7luxuGeJ5b_9-NN9AYJ8KoXLL2rjYnRSnnB3S83XLCGx2noeQA3RpyGAXILK1ZiI/pub?output=csv'; 

        function checkPass() {
            if(document.getElementById('passInput').value === "Girmay2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchExcelData();
            } else { alert("Incorrect Password!"); }
        }

        // --- THE POWERFUL NUMBER PARSER ---
        function parseGermanNum(val) {
            if (!val) return 0;
            let clean = val.replace(/"/g, '').replace('€', '').trim();
            // If it uses comma as decimal: 1.300,50 -> 1300.50
            if (clean.includes(',') && clean.includes('.')) {
                clean = clean.replace(/\./g, '').replace(',', '.');
            } else if (clean.includes(',')) {
                clean = clean.replace(',', '.');
            } else if (clean.includes('.')) {
                let parts = clean.split('.');
                if (parts[parts.length-1].length === 3) clean = clean.replace(/\./g, '');
            }
            return parseFloat(clean) || 0;
        }

        async function fetchExcelData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const data = await response.text();
                const rows = data.split(/\r?\n/); 
                const tableBody = document.getElementById('excelTableBody');
                tableBody.innerHTML = '';
                
                let debtTotal = 0;
                let repairTotal = 0;

                rows.forEach((row, index) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        if (name.toLowerCase() === "name" || name === "") return;

                        const debtAmt = parseGermanNum(cols[1]);
                        const repairAmt = parseGermanNum(cols[2]);
                        const phone = cols[3] ? cols[3].replace(/"/g, '').trim() : "";
                        const email = cols[4] ? cols[4].replace(/"/g, '').trim() : "";

                        debtTotal += debtAmt;
                        repairTotal += repairAmt;

                        let actions = `<div class="flex justify-center gap-2">`;
                        if (phone.length > 5) actions += `<a href="tel:${phone}" class="bg-green-100 text-green-600 px-3 py-1 rounded-lg text-[10px] font-black border border-green-200">📞</a>`;
                        if (email.includes('@')) actions += `<a href="mailto:${email}" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-lg text-[10px] font-black border border-blue-200">📧</a>`;
                        actions += `</div>`;

                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50 transition-all border-b border-slate-50";
                        tr.innerHTML = `
                            <td class="p-5 uppercase text-slate-700 tracking-tighter">${name}</td>
                            <td class="p-5 text-right font-mono text-blue-800">€${debtAmt.toLocaleString('de-DE', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-right font-mono text-green-600">€${repairAmt.toLocaleString('de-DE', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-center">${actions}</td>
                        `;
                        tableBody.appendChild(tr);
                    }
                });

                document.getElementById('debtTotalDisplay').innerText = `€${debtTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('repairTotalDisplay').innerText = `€${repairTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('grandTotalDisplay').innerText = `€${(debtTotal + repairTotal).toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
            } catch (e) { console.error(e); }
        }

        function searchNames() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("excelTableBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let text = td.textContent || td.innerText;
                    tr[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
        setInterval(fetchExcelData, 60000);
    </script>
</body>
</html>
