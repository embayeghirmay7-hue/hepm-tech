 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKEY | Smart Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-yellow-500/30">
        <h1 class="text-xl font-black italic mb-6 text-center text-yellow-500 uppercase tracking-tighter">HAKEY STOCK TRACKER 📈</h1>
        
        <div class="space-y-4">
            <div class="bg-black/50 p-4 rounded-2xl border border-slate-800">
                <label class="block text-[9px] font-bold uppercase text-slate-500 mb-2">Bulk Buying Price (£1800?)</label>
                <input type="number" id="bulkCost" oninput="calculate()" placeholder="e.g. 1800" class="w-full bg-transparent text-xl font-bold text-white outline-none">
                
                <label class="block text-[9px] font-bold uppercase text-slate-500 mt-3 mb-2">Total Weight (Grams)</label>
                <input type="number" id="totalWeight" oninput="calculate()" placeholder="e.g. 500" class="w-full bg-transparent text-xl font-bold text-white outline-none">
            </div>

            <hr class="border-slate-800 my-4">

            <div>
                <label class="block text-[9px] font-bold uppercase text-slate-500 mb-2">Sale Weight (e.g. 3.5)</label>
                <input type="number" id="saleWeight" oninput="calculate()" placeholder="3.5" class="w-full bg-black border-2 border-slate-800 p-4 rounded-2xl text-xl font-bold text-yellow-500 outline-none focus:border-yellow-500">
            </div>

            <div>
                <label class="block text-[9px] font-bold uppercase text-slate-500 mb-2">Retail Sale Price (£)</label>
                <input type="number" id="salePrice" oninput="calculate()" placeholder="40" class="w-full bg-black border-2 border-slate-800 p-4 rounded-2xl text-xl font-bold text-green-500 outline-none focus:border-green-500">
            </div>

            <div class="pt-6 space-y-3">
                <div class="flex justify-between items-center text-sm font-bold">
                    <span class="text-slate-500 uppercase">Cost of this portion:</span>
                    <span id="portionCost" class="text-red-400">£0.00</span>
                </div>
                <div class="flex justify-between items-center bg-yellow-500/10 p-5 rounded-2xl border border-yellow-500/20">
                    <span class="text-sm font-black uppercase text-yellow-500 tracking-widest">Net Profit:</span>
                    <span id="netProfit" class="text-3xl font-black text-white">£0.00</span>
                </div>
            </div>
        </div>

        <button onclick="location.href='index.html'" class="w-full mt-8 bg-slate-800 text-white py-4 rounded-2xl font-bold text-[10px] uppercase tracking-widest hover:bg-yellow-500 hover:text-black transition-all">← Back to Hakey Shop</button>
    </div>

    <script>
        function calculate() {
            const bulkCost = parseFloat(document.getElementById('bulkCost').value) || 0;
            const totalWeight = parseFloat(document.getElementById('totalWeight').value) || 0;
            const saleWeight = parseFloat(document.getElementById('saleWeight').value) || 0;
            const salePrice = parseFloat(document.getElementById('salePrice').value) || 0;

            // 1. ዋጋ ሓንቲ ግራም (Cost per gram)
            const costPerGram = totalWeight > 0 ? bulkCost / totalWeight : 0;
            
            // 2. እቲ ዝተሸጠ መጠን ክንደይ ወጻኢ ነይርዎ (Portion cost)
            const portionCost = costPerGram * saleWeight;
            
            // 3. መኽሰብ (Net Profit)
            const profit = salePrice - portionCost;

            document.getElementById('portionCost').innerText = `£${portionCost.toFixed(2)}`;
            document.getElementById('netProfit').innerText = `£${profit.toFixed(2)}`;
        }
    </script>
</body>
</html>
