<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-slate-100 min-h-screen pb-20 font-sans text-slate-900">

            <h1 class="text-3xl font-black text-blue-900 mb-6 italic tracking-tighter uppercase font-mono">HEPM-TECH</h1>
            <input type="password" id="passInput" placeholder="Password: Girmay2026" class="w-full p-4 border-2 rounded-xl mb-4 text-center font-bold outline-none focus:border-blue-600">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-blue-700 transition-all uppercase tracking-widest">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-900 p-5 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <h2 class="text-xl font-black italic tracking-tighter uppercase">🚀 HEPM-TECH LIVE</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Logout</button>

        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="bg-slate-800 text-white p-8 rounded-3xl shadow-2xl border-b-8 border-yellow-400 min-w-[320px] mb-4">
                    <p class="text-gray-400 text-[10px] mb-2 uppercase font-black tracking-widest italic">Corrected Total Live Sum</p>
                    <h2 id="liveTotalDisplay" class="text-5xl font-black text-yellow-400 font-mono italic">€0.00</h2>
                </div>
                <p id="syncStatus" class="text-blue-900 font-black text-[10px] uppercase italic tracking-[0.2em] animate-pulse">● System Syncing...</p>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                <div class="bg-blue-700 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h3 class="text-white font-black uppercase tracking-widest italic text-sm">👥 Live Register & Actions</h3>
                    <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="🔍 Search name..." class="p-3 rounded-xl border-none outline-none w-full md:w-64 font-bold shadow-inner text-slate-800">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-[10px] font-black uppercase text-slate-500 border-b">

                                <th class="p-5 text-right">Amount</th>
                                <th class="p-5 text-center">Quick Actions</th>
                            </tr>
                        </thead>
                        <tbody id="excelTableBody" class="divide-y divide-slate-100 font-bold italic">
                            <tr><td colspan="3" class="p-10 text-center text-slate-400 animate-pulse uppercase font-black text-xs italic">Loading Live Data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

            if(document.getElementById('passInput').value === "Girmay2026") {
