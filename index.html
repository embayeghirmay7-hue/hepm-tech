 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM SHOP - Products</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f4; margin: 0; padding: 0; }
        
        header { background: var(--dark); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        .logo { font-size: 30px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .container { max-width: 900px; margin: 20px auto; padding: 15px; }
        
        /* Product Grid (እቲ ፍርያት ዝስርዕሉ) */
        .product-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 20px;
        }

        .product-card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
            transition: 0.3s;
            border: 1px solid #eee;
            text-align: center;
        }
        .product-card:hover { transform: translateY(-10px); }

        .product-img { 
            width: 100%; 
            height: 200px; 
            background: #f9f9f9; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 60px; /* ኣብ ክንዲ ስእሊ ንግዚኡ Emoji ተጠቒመ ኣለኹ */
        }

        .product-info { padding: 20px; }
        .product-info h3 { margin: 10px 0; color: var(--dark); font-size: 22px; }
        .product-info p { color: #777; font-size: 14px; margin-bottom: 15px; }
        
        .order-btn { 
            background: var(--gold); 
            color: white; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 50px; 
            font-weight: bold; 
            cursor: pointer; 
            width: 100%;
            font-size: 16px;
        }

        /* Order Form Modal (ምስ ተጠወቐ ዝመጽእ) */
        #order-modal { 
            display: none; 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 100; 
            justify-content: center; 
            align-items: center; 
        }
        .modal-content { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            width: 90%; 
            max-width: 450px; 
        }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="logo">HEPM <span>SHOP</span></div>
</header>

<div class="container">
    <h2 style="text-align: center; color: #333;">Our Premium Products / ጽፉፍ ፍርያትና</h2>
    
    <div class="product-grid">
        <div class="product-card">
            <div class="product-img">🌾</div>
            <div class="product-info">
                <h3>White Teff (ጻዕዳ ጣፍ)</h3>
                <p>Pure and clean high-quality white teff from Ethiopia/Eritrea.</p>
                <button class="order-btn" onclick="openOrder('White Teff')">ORDER NOW / ኣዝዝ</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img">🌶️</div>
            <div class="product-info">
                <h3>Berbere (በርበረ)</h3>
                <p>Spicy and aromatic traditional spice blend.</p>
                <button class="order-btn" onclick="openOrder('Berbere')">ORDER NOW / ኣዝዝ</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img">🥣</div>
            <div class="product-info">
                <h3>Shiro (ሽሮ)</h3>
                <p>Deliciously roasted and ground chickpea flour.</p>
                <button class="order-btn" onclick="openOrder('Shiro')">ORDER NOW / ኣዝዝ</button>
            </div>
        </div>
    </div>
</div>

<div id="order-modal">
    <div class="modal-content">
        <h2 id="modal-title" style="color: var(--gold);">Order Details</h2>
        <input type="text" id="custName" placeholder="Full Name / ምሉእ ስም">
        <select id="custWeight">
            <option value="1kg">1 Kilo</option>
            <option value="5kg">5 Kilo</option>
            <option value="10kg">10 Kilo</option>
            <option value="25kg">25 Kilo</option>
        </select>
        <input type="tel" id="custPhone" placeholder="Phone Number / ተሌፎን">
        <button class="order-btn" style="background: #25D366;" onclick="sendToWhatsApp()">SEND VIA WHATSAPP</button>
        <button onclick="closeOrder()" style="background:none; border:none; color:red; cursor:pointer; margin-top:10px;">Cancel / ይትረፍ</button>
    </div>
</div>

<script>
    let selectedProduct = "";

    function openOrder(product) {
        selectedProduct = product;
        document.getElementById('modal-title').innerText = "Order: " + product;
        document.getElementById('order-modal').style.display = 'flex';
    }

    function closeOrder() {
        document.getElementById('order-modal').style.display = 'none';
    }
