 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Smart Girmay Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-20 font-sans text-slate-900">
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md border-t-8 border-blue-600 text-center">
            <h1 class="text-3xl font-black text-blue-900 mb-6 italic tracking-tighter uppercase font-mono">HEPM-TECH</h1>
            <input type="password" id="passInput" placeholder="Password: Girmay2026" class="w-full p-4 border-2 rounded-xl mb-4 text-center font-bold outline-none focus:border-blue-600">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-lg uppercase tracking-widest hover:bg-blue-700 transition-all">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-900 p-5 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <h2 class="text-xl font-bold italic tracking-tighter uppercase">🚀 HEPM-TECH LIVE</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest shadow-lg">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <div class="flex flex-col items-center mb-10 text-center">
                <div class="bg-slate-800 text-white p-8 rounded-3xl shadow-2xl border-b-8 border-yellow-400 min-w-[320px] mb-4">
                    <p class="text-gray-400 text-[10px] mb-2 uppercase font-black tracking-widest">Current Total Debt (Sum)</p>
                    <h2 id="liveTotalDisplay" class="text-5xl font-black text-yellow-400 font-mono italic">€0.00</h2>
                </div>
                <p id="syncStatus" class="text-blue-900 font-black text-[10px] uppercase italic tracking-[0.2em] animate-pulse">● Auto-Calculating from Excel</p>
            </div>

            <div class="grid gap-6 grid-cols-1 md:grid-cols-3 mb-12">
                <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-orange-500 hover:scale-105 transition-all">
                    <h3 class="text-xl font-black text-gray-800 mb-1 uppercase tracking-tighter">EOS (VKB)</h3>
                    <p class="text-2xl font-black text-blue-800 mb-4 font-mono italic">50.00 EUR</p>
                    <a href="tel:05618002450" class="flex items-center p-3 bg-blue-50 text-blue-700 rounded-xl font-bold text-xs"><span class="mr-2">📞</span> Call EOS</a>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-orange-500 hover:scale-105 transition-all">
                    <h3 class="text-xl font-black text-gray-800 mb-1 uppercase tracking-tighter">Riverty</h3>
                    <p class="text-2xl font-black text-blue-800 mb-4 font-mono italic">1,250.00 EUR</p>
                    <a href="tel:0722150400" class="flex items-center p-3 bg-blue-50 text-blue-700 rounded-xl font-bold text-xs"><span class="mr-2">📞</span> Call Riverty</a>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-xl border-t-8 border-blue-900 hover:scale-105 transition-all">
                    <h3 class="text-xl font-black text-gray-800 mb-1 uppercase tracking-tighter text-center">DB</h3>
                    <p class="text-2xl font-black text-blue-800 mb-4 font-mono text-center italic">6,300.00 EUR</p>
                    <a href="tel:06991010000" class="flex items-center p-3 bg-blue-50 text-blue-700 rounded-xl font-bold text-xs"><span class="mr-2">📞</span> Call Bank</a>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
                <div class="bg-blue-700 p-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-blue-900 text-white">
                    <h3 class="font-black uppercase tracking-widest italic flex items-center text-sm">👥 Live Person Register</h3>
                    <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="🔍 Search names..." class="p-3 rounded-xl border-none outline-none w-full md:w-64 font-bold shadow-2xl text-slate-800">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-100 text-[10px] font-black uppercase text-slate-500 border-b">
                                <th class="p-5">Name</th>
                                <th class="p-5 text-right font-black">Amount</th>
                                <th class="p-5 text-center font-black">Status</th>
                            </tr>
                        </thead>
                        <tbody id="excelTableBody" class="divide-y divide-slate-100 font-bold italic">
                            <tr><td colspan="3" class="p-10 text-center text-blue-400 animate-pulse uppercase text-xs font-black tracking-widest">Syncing with Excel...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQNB9mk6WZnyeUhr13IPvrnactQaEl5QX0X-WNeelpiMNQuKhYoeIDusRNIT1Fgv3cstddtPUh8KRNj/pub?gid=0&single=true&output=csv'; 

        function checkPass() {
            if(document.getElementById('passInput').value === "Girmay2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchExcelData();
            } else { alert("Incorrect Password!"); }
        }

        async function fetchExcelData() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                const data = await response.text();
                const rows = data.split('\n'); 
                const tableBody = document.getElementById('excelTableBody');
                tableBody.innerHTML = '';
                
                let totalSum = 0;

                rows.forEach((row) => {
                    const columns = row.split(',');
                    if (columns.length >= 2 && columns[0].trim() !== "" && columns[0].toLowerCase() !== "name") {
                        const name = columns[0].trim();
                        // This removes any non-numeric characters except dots and minus signs
                        const amountStr = columns[1].replace(/[^0-9.-]+/g,"");
                        const amount = parseFloat(amountStr) || 0;
                        
                        totalSum += amount;

                        const tr = document.createElement('tr');
                        tr.className = "hover:bg-blue-50 transition-all";
                        tr.innerHTML = `
                            <td class="p-5 uppercase text-sm font-black text-slate-700">${name}</td>
                            <td class="p-5 text-right font-mono text-blue-800 font-black italic">€${amount.toLocaleString('en-DE', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-center"><span class="bg-green-100 text-green-600 px-3 py-1 rounded text-[9px] uppercase font-black tracking-tighter border border-green-200">Live</span></td>
                        `;
                        tableBody.appendChild(tr);
                    }
                });

                document.getElementById('liveTotalDisplay').innerText = `€${totalSum.toLocaleString('en-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('syncStatus').innerText = "● Live Data Synced Successfully";

            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('excelTableBody').innerHTML = '<tr><td colspan="3" class="p-5 text-center text-red-500 font-black italic uppercase">Error connecting to Google Sheets. Check Publish settings!</td></tr>';
                document.getElementById('syncStatus').innerText = "● Sync Error - Check Connection";
                document.getElementById('syncStatus').classList.add('text-red-500');
            }
        }

        function searchNames() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("excelTableBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let text = td.textContent || td.innerText;
                    tr[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
    </script>
</body>
</html>
