 <div class="order-form" style="max-width: 500px; margin: auto; padding: 20px; background: #fff; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #D4AF37;">HEPM SHOP ORDER</h2>
    
    <div class="input-group" style="margin-bottom: 15px; text-align: left;">
        <label>Full Name / ምሉእ ስም</label>
        <input type="text" id="custName" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
    </div>

    <div class="input-group" style="margin-bottom: 15px; text-align: left;">
        <label>Product / ዓይነት ፍርያት</label>
        <select id="custProduct" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
            <option value="Teff">White Teff / ጻዕዳ ጣፍ</option>
            <option value="Brown Teff">Brown Teff / ቀይሕ ጣፍ</option>
            <option value="Berbere">Berbere / በርበረ</option>
        </select>
    </div>

    <div class="input-group" style="margin-bottom: 15px; text-align: left;">
        <label>Weight (Kilo) / ክብደት ብኪሎ</label>
        <select id="custWeight" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
            <option value="1kg">1 Kilo</option>
            <option value="2kg">2 Kilo</option>
            <option value="5kg">5 Kilo</option>
            <option value="10kg">10 Kilo</option>
            <option value="25kg">25 Kilo</option>
        </select>
    </div>

    <div class="input-group" style="margin-bottom: 20px; text-align: left;">
        <label>Phone Number / ቁጽሪ ተሌፎን</label>
        <input type="tel" id="custPhone" placeholder="+49..." style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;">
    </div>

    <button onclick="submitToWhatsApp()" style="width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;">
        SEND ORDER VIA WHATSAPP
    </button>
</div>

<script>
function submitToWhatsApp() {
    const name = document.getElementById('custName').value;
    const product = document.getElementById('custProduct').value;
    const weight = document.getElementById('custWeight').value;
    const phone = document.getElementById('custPhone').value;

    if(name === "" || phone === "") {
        alert("በጃኹም ስምኩምን ቁጽሪ ተሌፎንኩምን ምልኡ!");
        return;
    }

    // ናብ WhatsApp መልእኽቲ ንምስዳድ
    const message = `HEPM SHOP ORDER:%0AName: ${name}%0AProduct: ${product}%0AWeight: ${weight}%0APhone: ${phone}`;
    const whatsappURL = `https://wa.me/49123456789?text=${message}`; // ኣብዚ ቁጽሪ ተሌፎንካ ተካእዮ
    
    window.open(whatsappURL, '_blank');
}
</script>
