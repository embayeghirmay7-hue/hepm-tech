 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAKEY | Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans">

    <nav class="p-6 border-b border-yellow-600/20 sticky top-0 bg-black/80 backdrop-blur-md z-50 flex justify-between items-center">
        <h1 class="text-3xl font-black italic tracking-tighter text-yellow-500">HAKEY</h1>
        <div class="space-x-4">
            <button onclick="location.href='calculator.html'" class="text-[10px] font-bold border border-yellow-500/50 px-4 py-2 rounded-full uppercase text-yellow-500">Calc 📈</button>
        </div>
    </nav>

    <header class="py-20 text-center px-4 bg-gradient-to-b from-yellow-500/10 to-transparent">
        <h2 class="text-5xl font-black mb-4 uppercase">Welcome to HAKEY</h2>
        <p class="text-slate-400 max-w-md mx-auto font-medium">Premium Service. Quality Guaranteed. Fast Delivery.</p>
        <div class="mt-8">
            <button onclick="scrollToShop()" class="bg-yellow-500 text-black px-10 py-4 rounded-full font-black uppercase tracking-widest hover:scale-105 transition-all">Explore Menu</button>
        </div>
    </header>

    <main id="shop" class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-8">
            </div>
    </main>

    <footer class="p-20 text-center border-t border-slate-800">
        <p class="text-slate-600 font-bold uppercase tracking-widest text-xs">© 2026 HAKEY DIGITAL</p>
    </footer>

    <script>
        // ንግዚኡ እቲ ናይ HEPM Google Sheet ክጥቀም እየ፡ ጸኒሕካ ሓድሽ ክትቀይሮ ትኽእል ኢኻ
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?output=csv';

        async function loadHakeyShop() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 1) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const img = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        if(!name) return;
                        
                        const card = document.createElement('div');
                        card.className = "group relative bg-slate-900/50 border border-slate-800 rounded-[2.5rem] p-3 hover:border-yellow-500/50 transition-all";
                        card.innerHTML = `
                            <div class="h-48 md:h-64 overflow-hidden rounded-[2rem] bg-slate-800 mb-4">
                                <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition-duration-500">
                            </div>
                            <h3 class="text-sm font-black uppercase text-center mb-4 tracking-widest">${name}</h3>
                            <button class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase text-[10px] tracking-widest">Order Now</button>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (err) { console.error(err); }
        }

        function scrollToShop() {
            document.getElementById('shop').scrollIntoView({ behavior: 'smooth' });
        }

        window.onload = loadHakeyShop;
    </script>
</body>
</html>
