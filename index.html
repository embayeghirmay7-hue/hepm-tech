 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Ultimate Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-100 min-h-screen pb-20 font-sans text-slate-900">
    <div id="loginPage" class="flex items-center justify-center min-h-screen p-4 bg-slate-900">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-black text-blue-900 mb-6 italic uppercase">HEPM-TECH</h1>
            <input type="password" id="passInput" placeholder="Password: Girmay2026" class="w-full p-4 border-2 rounded-2xl mb-4 text-center font-bold outline-none">
            <button onclick="checkPass()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all uppercase">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <nav class="bg-blue-900 p-5 text-white flex justify-between items-center shadow-lg sticky top-0 z-50">
            <h2 class="text-xl font-black italic uppercase">🚀 HEPM-TECH LIVE</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Logout</button>
        </nav>

        <div class="max-w-6xl mx-auto p-4 md:p-8">
            <div class="grid gap-4 grid-cols-1 md:grid-cols-3 mb-10 text-center">
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-blue-500">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Debt (B)</p>
                    <h2 id="debtSum" class="text-3xl font-black text-blue-900 font-mono italic">€0,00</h2>
                </div>
                <div class="bg-white p-6 rounded-3xl shadow-lg border-b-8 border-green-500">
                    <p class="text-[10px] font-black uppercase text-slate-400">Total Repair (C)</p>
                    <h2 id="repairSum" class="text-3xl font-black text-green-600 font-mono italic">€0,00</h2>
                </div>
                <div class="bg-slate-800 p-6 rounded-3xl shadow-2xl border-b-8 border-yellow-400">
                    <p class="text-[10px] font-black uppercase text-yellow-500">Grand Total (B+C)</p>
                    <h2 id="grandSum" class="text-4xl font-black text-white font-mono italic">€0,00</h2>
                </div>
            </div>

            <div class="grid gap-4 grid-cols-1 md:grid-cols-3 mb-10">
                <div class="bg-white p-5 rounded-3xl shadow-md border-t-8 border-orange-500 text-center">
                    <h4 class="font-black text-xs uppercase mb-3">EOS (VKB)</h4>
                    <a href="tel:05618002450" class="block bg-slate-50 p-2 rounded-xl text-blue-600 font-bold text-xs mb-2">📞 0561 800-2450</a>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-md border-t-8 border-orange-500 text-center">
                    <h4 class="font-black text-xs uppercase mb-3">RIVERTY</h4>
                    <a href="tel:0722150400" class="block bg-slate-50 p-2 rounded-xl text-blue-600 font-bold text-xs mb-2">📞 07221 5040-0</a>
                </div>
                <div class="bg-white p-5 rounded-3xl shadow-md border-t-8 border-blue-900 text-center">
                    <h4 class="font-black text-xs uppercase mb-3">DEUTSCHE BANK</h4>
                    <a href="tel:06991010000" class="block bg-slate-50 p-2 rounded-xl text-blue-600 font-bold text-xs mb-2">📞 069 910-10000</a>
                </div>
            </div>

            <div class="bg-white rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200">
                <div class="bg-blue-700 p-6 flex flex-col md:flex-row justify-between items-center gap-4">
                    <h3 class="text-white font-black uppercase text-sm italic tracking-widest">👥 Live Register</h3>
                    <input type="text" id="searchInput" onkeyup="searchNames()" placeholder="Search name..." class="w-full md:w-64 p-3 rounded-2xl outline-none font-bold text-slate-800">
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                                <th class="p-5">Name</th>
                                <th class="p-5 text-right">Debt (B)</th>
                                <th class="p-5 text-right">Repair (C)</th>
                                <th class="p-5 text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 font-bold italic text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT05rM698Fulyxz7luxuGeJ5b_9-NN9AYJ8KoXLL2rjYnRSnnB3S83XLCGx2noeQA3RpyGAXILK1ZiI/pub?output=csv';

        function checkPass() {
            if(document.getElementById('passInput').value === "Girmay2026") {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                fetchData();
            } else { alert("Wrong Password!"); }
        }

        function cleanNum(val) {
            if(!val) return 0;
            let clean = val.replace(/"/g, '').replace('€', '').trim();
            if(clean.includes('.') && clean.includes(',')) {
                clean = clean.replace(/\./g, '').replace(',', '.');
            } else if(clean.includes(',')) {
                clean = clean.replace(',', '.');
            } else if(clean.includes('.') && clean.split('.').pop().length === 3) {
                clean = clean.replace(/\./g, '');
            }
            return parseFloat(clean) || 0;
        }

        async function fetchData() {
            try {
                const res = await fetch(CSV_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/);
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                let dTotal = 0, rTotal = 0;

                rows.forEach((row, i) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        if(name.toLowerCase() === "name" || !name) return;
                        
                        const debt = cleanNum(cols[1]);
                        const repair = cleanNum(cols[2]);
                        
                        dTotal += debt;
                        rTotal += repair;

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="p-5 uppercase text-slate-800 font-black">${name}</td>
                            <td class="p-5 text-right font-mono text-blue-700">€${debt.toLocaleString('de-DE', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-right font-mono text-green-600">€${repair.toLocaleString('de-DE', {minimumFractionDigits: 2})}</td>
                            <td class="p-5 text-center text-slate-300">Active</td>
                        `;
                        tbody.appendChild(tr);
                    }
                });
                document.getElementById('debtSum').innerText = `€${dTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('repairSum').innerText = `€${rTotal.toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
                document.getElementById('grandSum').innerText = `€${(dTotal + rTotal).toLocaleString('de-DE', {minimumFractionDigits: 2})}`;
            } catch (e) { console.error(e); }
        }

        function searchNames() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let tr = document.getElementById("tableBody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let text = td.textContent || td.innerText;
                    tr[i].style.display = text.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }
        setInterval(fetchData, 60000);
    </script>
</body>
</html>
