 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Professional Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card { transition: all 0.3s ease; border-radius: 2rem; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4 border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black text-blue-900 italic uppercase tracking-tighter">HEPM-TECH</h1>
            <div class="text-[10px] font-bold text-green-500 uppercase tracking-widest">● Active Shop</div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-2 italic uppercase">Order Details</h2>
            <p id="selectedItemName" class="text-blue-600 font-bold mb-6 text-sm"></p>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Your Name (ስም)</label>
                    <input type="text" id="custName" placeholder="Enter your name" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                </div>
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2">Location/Address (ኣድራሻ)</label>
                    <textarea id="custLoc" placeholder="Where should we deliver?" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500 font-bold h-24"></textarea>
                </div>
                <button onclick="confirmAndSend()" class="w-full bg-green-500 text-white p-5 rounded-2xl font-black shadow-lg shadow-green-100 hover:bg-black transition-all">
                    SEND TO WHATSAPP <i class="fab fa-whatsapp ml-2"></i>
                </button>
                <button onclick="closeModal()" class="w-full text-slate-400 font-bold text-xs uppercase tracking-widest mt-2">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?gid=0&single=true&output=csv';
        const MY_PHONE = "447448700978"; 
        let currentItem = {};

        async function fetchShop() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const price = cols[1] ? cols[1].replace(/"/g, '').trim() : "0";
                        const photo = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        if(!name) return;

                        const card = document.createElement('div');
                        card.className = "product-card bg-white border border-slate-100 p-2 flex flex-col hover:shadow-xl";
                        card.innerHTML = `
                            <div class="h-44 md:h-60 overflow-hidden rounded-[1.5rem] bg-slate-100 mb-3">
                                <img src="${photo}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=${name}'">
                            </div>
                            <div class="p-3 flex flex-col flex-grow">
                                <h3 class="text-slate-800 font-black text-xs uppercase mb-3">${name}</h3>
                                <div class="mt-auto flex justify-between items-center">
                                    <span class="text-blue-600 font-black text-lg italic">€${price}</span>
                                    <button onclick="openModal('${name}', '${price}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg shadow-blue-100 hover:bg-black">ORDER</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (e) { console.error("Error"); }
        }

        function openModal(name, price) {
            currentItem = { name, price };
            document.getElementById('selectedItemName').innerText = `Product: ${name} (€${price})`;
            document.getElementById('orderModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('active');
        }

        function confirmAndSend() {
            const name = document.getElementById('custName').value;
            const location = document.getElementById('custLoc').value;

            if(!name || !location) {
                alert("Please enter Name and Location!");
                return;
            }

            const message = `*NEW ORDER* 🛍️\n\n*Product:* ${currentItem.name}\n*Price:* €${currentItem.price}\n\n*Customer Info:* \n👤 Name: ${name}\n📍 Location: ${location}`;
            const whatsappUrl = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`;
            
            window.open(whatsappUrl, '_blank');
            closeModal();
        }

        window.onload = fetchShop;
    </script>
</body>
</html>
