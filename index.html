 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Smart Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card:hover img { transform: scale(1.1); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="sticky top-0 z-50 glass shadow-sm p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-lg">
                    <i class="fas fa-candy-cane text-white"></i>
                </div>
                <h1 class="text-xl font-black text-blue-900 italic uppercase">HEPM-TECH</h1>
            </div>
            <input type="text" id="searchInput" onkeyup="searchMenu()" placeholder="Search..." 
                   class="p-2 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-500">
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <div id="menuGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?gid=0&single=true&output=csv';

        async function fetchMenu() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1); 
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';

                rows.forEach((row) => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const price = cols[1] ? cols[1].replace(/"/g, '').trim() : "0";
                        const photoFromSheet = cols[2] ? cols[2].replace(/"/g, '').trim() : '';

                        if(!name) return;

                        // SMART PHOTO LOGIC: 
                        // If Sheet is empty, use a high-quality Candy image based on the name
                        const displayPhoto = photoFromSheet || `https://source.unsplash.com/featured/?candy,${name}`;

                        const card = document.createElement('div');
                        card.className = "product-card bg-white rounded-3xl shadow-sm border overflow-hidden transition-all hover:shadow-xl";
                        card.innerHTML = `
                            <div class="h-40 overflow-hidden bg-gray-100">
                                <img src="${displayPhoto}" class="w-full h-full object-cover transition-transform" 
                                     onerror="this.src='https://loremflickr.com/400/400/candy'">
                            </div>
                            <div class="p-4">
                                <h3 class="font-black text-[11px] uppercase text-gray-700 mb-2 h-8 overflow-hidden">${name}</h3>
                                <div class="flex justify-between items-center">
                                    <span class="text-blue-600 font-black">€${price}</span>
                                    <button onclick="order('${name}')" class="bg-blue-600 text-white p-2 rounded-lg text-[10px] font-bold">+ ADD</button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (e) { console.log("Error"); }
        }

        function order(name) {
            window.open(`https://wa.me/447756555684?text=I want to order ${name}`, '_blank');
        }

        function searchMenu() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let cards = document.getElementsByClassName("product-card");
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector("h3").innerText;
                cards[i].style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
