 <script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT05rM698Fulyxz7luxuGeJ5b_9-NN9AYJ8KoXLL2rjYnRSnnB3S83XLCGx2noeQA3RpyGAXILK1ZiI/pub?gid=0&single=true&output=csv'; 

    async function fetchExcelData() {
        try {
            const response = await fetch(SHEET_CSV_URL);
            const data = await response.text();
            const rows = data.split('\n'); 
            const tableBody = document.getElementById('excelTableBody');
            tableBody.innerHTML = '';
            
            let totalSum = 0;

            rows.forEach((row) => {
                const columns = row.split(',');
                if (columns.length >= 2 && columns[0].trim() !== "" && columns[0].toLowerCase() !== "name") {
                    const name = columns[0].trim();
                    
                    // CLEANING THE NUMBER: 
                    // This part removes € and any weird dots/commas to get the real number
                    let amountStr = columns[1].replace('€', '').trim();
                    
                    // If your Excel uses comma for decimals (e.g. 300,50), this fixes it:
                    amountStr = amountStr.replace(/\./g, '').replace(',', '.');
                    
                    const amount = parseFloat(amountStr) || 0;
                    totalSum += amount;

                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-blue-50 transition-all";
                    tr.innerHTML = `
                        <td class="p-5 uppercase text-sm font-black text-slate-700">${name}</td>
                        <td class="p-5 text-right font-mono text-blue-800 font-black italic">€${amount.toLocaleString('en-DE', {minimumFractionDigits: 2})}</td>
                        <td class="p-5 text-center"><span class="bg-green-100 text-green-600 px-3 py-1 rounded text-[9px] uppercase font-black border border-green-200">Live Sync</span></td>
                    `;
                    tableBody.appendChild(tr);
                }
            });

            // UPDATE THE BIG DISPLAY
            document.getElementById('liveTotalDisplay').innerText = `€${totalSum.toLocaleString('en-DE', {minimumFractionDigits: 2})}`;

        } catch (error) {
            console.error("Error:", error);
        }
    }
</script>
