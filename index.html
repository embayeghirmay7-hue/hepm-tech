<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card { transition: all 0.3s ease; border-radius: 2rem; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4 border-b">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-600 p-2 rounded-xl shadow-lg italic font-black text-white">HT</div>
                <h1 class="text-xl font-black text-blue-900 italic uppercase tracking-tighter">HEPM-TECH</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Store Open</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        // Google Sheet Link
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?gid=0&single=true&output=csv';
        
        // YOUR UPDATED WHATSAPP NUMBER
        const MY_PHONE = "447448700978"; 

        async function fetchShop() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/).slice(1);
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const price = cols[1] ? cols[1].replace(/"/g, '').trim() : "0";
                        const photo = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        
                        if(!name) return;

                        const card = document.createElement('div');
                        card.className = "product-card bg-white border border-slate-100 overflow-hidden flex flex-col p-2";
                        card.innerHTML = `
                            <div class="h-44 md:h-60 overflow-hidden rounded-[1.5rem] bg-slate-100 mb-3">
                                <img src="${photo}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400?text=${name}'">
                            </div>
                            <div class="p-3 flex flex-col flex-grow">
                                <h3 class="text-slate-800 font-black text-xs uppercase mb-3 h-8 overflow-hidden">${name}</h3>
                                <div class="mt-auto flex justify-between items-center">
                                    <span class="text-blue-600 font-black text-lg italic">€${price}</span>
                                    <button onclick="sendOrder('${name}', '${price}')" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black shadow-lg shadow-green-100 hover:bg-black transition-all">
                                        ORDER <i class="fab fa-whatsapp ml-1"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (e) { console.error("Error loading data"); }
        }

        function sendOrder(name, price) {
            const message = `Hello HEPM-TECH, I want to order: ${name} (Price: €${price})`;
            const whatsappUrl = `https://wa.me/${MY_PHONE}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
        }

        window.onload = fetchShop;
    </script>
</body>
</html>
