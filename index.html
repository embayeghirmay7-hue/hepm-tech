<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Professional Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 2.5rem; }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); z-index: 100; align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; }
        .form-container { max-height: 90vh; overflow-y: auto; scrollbar-width: none; }
        input, textarea { border: 1.5px solid #f1f5f9 !important; transition: 0.3s; }
        input:focus, textarea:focus { border-color: #2563eb !important; background: white !important; outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <nav class="bg-white/80 backdrop-blur-md shadow-sm sticky top-0 z-50 p-4 border-b border-slate-100">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-10 h-10 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                    <i class="fas fa-bolt text-white text-sm"></i>
                </div>
                <h1 class="text-xl font-black italic uppercase tracking-tighter text-slate-800">HEPM-TECH</h1>
            </div>
            <div class="hidden md:flex items-center gap-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                <span>Fast Delivery</span>
                <span class="text-blue-600">●</span>
                <span>Secure Payment</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-8">
            <div class="col-span-full text-center py-20 font-bold text-slate-400 uppercase tracking-widest animate-pulse">Loading Catalog...</div>
        </div>
    </main>

    <div id="orderModal" class="modal">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-6 md:p-10 shadow-2xl form-container relative">
            <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>
            
            <h2 class="text-2xl font-black text-slate-800 mb-1 italic uppercase tracking-tighter">Confirm Order</h2>
            <p id="selectedItemName" class="text-blue-600 font-black mb-8 text-[10px] bg-blue-50 px-4 py-1.5 rounded-full inline-block uppercase"></p>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Full Name (ስማ መጸውዒ)</label>
                    <input type="text" id="custName" placeholder="Enter your name" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Primary Phone</label>
                        <input type="tel" id="custPhone1" placeholder="Required" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Secondary Phone</label>
                        <input type="tel" id="custPhone2" placeholder="Optional" class="w-full p-4 bg-slate-50 rounded-2xl font-bold">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Delivery Date</label>
                        <input type="date" id="orderDate" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Preferred Time</label>
                        <input type="time" id="orderTime" class="w-full p-4 bg-slate-50 rounded-2xl font-bold text-sm">
                    </div>
                </div>

                <div class="bg-blue-50/50 p-4 rounded-2xl flex items-center gap-3 border border-blue-100">
                    <input type="checkbox" id="isFlexible" class="w-5 h-5 accent-blue-600 cursor-pointer">
                    <label for="isFlexible" class="text-[10px] font-black text-blue-800 uppercase leading-tight cursor-pointer">
                        I am flexible with time (ሰዓት ክቕየር ይኽእል እዩ)
                    </label>
                </div>

                <div>
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 mb-1 block italic">Delivery Address (ኣድራሻ)</label>
                    <textarea id="custLoc" placeholder="House number, Street, City..." class="w-full p-4 bg-slate-50 rounded-2xl font-bold h-24 resize-none"></textarea>
                </div>
