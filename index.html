 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Official Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card:hover img { transform: scale(1.05); }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <header class="sticky top-0 z-50 glass shadow-sm border-b p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center shadow-md">
                    <i class="fas fa-shopping-bag text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-tighter italic text-blue-900 leading-none">HEPM-TECH</h1>
                    <span class="text-[9px] font-bold uppercase tracking-widest text-blue-500">Premium Catalog</span>
                </div>
            </div>
            <div class="relative w-40 md:w-64">
                <input type="text" id="searchInput" onkeyup="searchMenu()" placeholder="Search..." 
                       class="w-full p-2 pl-8 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400 text-xs"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6 md:p-10">
        <div id="menuGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?gid=0&single=true&output=csv';

        async function fetchMenu() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/); 
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';

                rows.forEach((row, index) => {
                    if (index === 0) return; // Skip Header

                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const price = cols[1] ? cols[1].replace(/"/g, '').trim() : "0";
                        const photo = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        const category = cols[3] ? cols[3].replace(/"/g, '').trim() : 'CANDY';

                        if(!name) return;

                        // Improved placeholder if photo link is missing
                        const displayPhoto = photo ? photo : `https://placehold.co/600x600/004aad/ffffff?text=${encodeURIComponent(name)}`;

                        const card = document.createElement('div');
                        card.className = "product-card bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden transition-all duration-300 hover:shadow-xl flex flex-col";
                        card.innerHTML = `
                            <div class="h-44 md:h-60 overflow-hidden relative bg-slate-200">
                                <img src="${displayPhoto}" class="w-full h-full object-cover transition-transform duration-500" 
                                     onerror="this.src='https://placehold.co/600x600/004aad/ffffff?text=${encodeURIComponent(name)}'">
                                <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-black text-blue-600 uppercase">
                                    ${category}
                                </div>
                            </div>
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="text-slate-800 font-black text-xs md:text-sm uppercase mb-3 h-8 overflow-hidden">${name}</h3>
                                <div class="mt-auto flex justify-between items-center">
                                    <span class="text-blue-600 font-black text-lg italic">€${price}</span>
                                    <button onclick="orderViaWhatsApp('${name}', '${price}')" class="bg-blue-600 text-white px-4 py-2 rounded-xl hover:bg-black transition-colors shadow-lg shadow-blue-100 text-[10px] font-bold uppercase">
                                        + ADD
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (e) { console.error("Error loading CSV"); }
        }

        function orderViaWhatsApp(name, price) {
            const phoneNumber = "447756555684"; // Your WhatsApp number
            const message = `Hello HEPM-TECH, I would like to order: ${name} (Price: €${price})`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function searchMenu() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let cards = document.getElementsByClassName("product-card");
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector("h3").innerText;
                cards[i].style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
