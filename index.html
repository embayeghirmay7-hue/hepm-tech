 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM | Profit Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center p-6">

    <div class="bg-slate-800 p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-black italic mb-6 text-center text-yellow-400">PROFIT CALCULATOR 📈</h1>
        
        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Buying Price (Cost £)</label>
                <input type="number" id="costPrice" oninput="calculate()" placeholder="0.00" class="w-full bg-slate-900 border-none p-4 rounded-2xl text-xl font-bold text-red-400 outline-none focus:ring-2 focus:ring-red-500">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2">Selling Price (Sale £)</label>
                <input type="number" id="salePrice" oninput="calculate()" placeholder="0.00" class="w-full bg-slate-900 border-none p-4 rounded-2xl text-xl font-bold text-green-400 outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <hr class="border-slate-700">

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Profit £</p>
                    <p id="profitVal" class="text-2xl font-black text-white">£0.00</p>
                </div>
                <div class="bg-slate-900 p-4 rounded-2xl text-center">
                    <p class="text-[9px] font-bold text-slate-500 uppercase">Margin %</p>
                    <p id="marginVal" class="text-2xl font-black text-yellow-400">0%</p>
                </div>
            </div>

            <p id="message" class="text-center text-sm font-bold italic text-slate-500 pt-2 italic"></p>
        </div>
    </div>

    <script>
        function calculate() {
            const cost = parseFloat(document.getElementById('costPrice').value) || 0;
            const sale = parseFloat(document.getElementById('salePrice').value) || 0;
            const profitVal = document.getElementById('profitVal');
            const marginVal = document.getElementById('marginVal');
            const message = document.getElementById('message');

            const profit = sale - cost;
            const margin = sale > 0 ? (profit / sale) * 100 : 0;

            profitVal.innerText = `£${profit.toFixed(2)}`;
            marginVal.innerText = `${Math.round(margin)}%`;

            if (profit > 0) {
                message.innerText = "Good Profit! 🔥";
                message.className = "text-center text-sm font-bold italic text-green-400 pt-2";
            } else if (profit < 0) {
                message.innerText = "Losing Money! ⚠️";
                message.className = "text-center text-sm font-bold italic text-red-400 pt-2";
            } else {
                message.innerText = "Break Even";
                message.className = "text-center text-sm font-bold italic text-slate-500 pt-2";
            }
        }
    </script>
</body>
</html>
