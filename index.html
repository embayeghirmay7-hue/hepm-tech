 <!DOCTYPE html>
<html lang="ti">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM PREMIUM PRODUCTS</title>
    <style>
        :root { --gold: #D4AF37; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', sans-serif; background: #fdfdfd; margin: 0; padding: 0; }
        
        header { background: var(--dark); color: white; padding: 30px; text-align: center; border-bottom: 6px solid var(--gold); }
        .logo { font-size: 38px; font-weight: 900; letter-spacing: 2px; }
        .logo span { color: var(--gold); }

        .container { max-width: 900px; margin: 30px auto; padding: 15px; }
        
        /* Product List */
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }
        .product-card { 
            background: white; border-radius: 25px; overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #eee; text-align: center;
            transition: 0.3s;
        }
        .product-card:hover { transform: translateY(-5px); }

        .product-img { height: 220px; background: #f9f9f9; display: flex; align-items: center; justify-content: center; font-size: 70px; }
        .product-info { padding: 20px; }
        .product-info h3 { margin: 10px 0; font-size: 24px; color: var(--dark); }
        .origin { color: var(--gold); font-weight: bold; margin-bottom: 10px; display: block; }
        
        .order-btn { 
            background: var(--gold); color: white; border: none; padding: 15px; 
            border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; font-size: 18px;
        }

        /* Order Form Modal */
        #order-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100; justify-content: center; align-items: center; 
        }
        .modal-content { background: white; padding: 35px; border-radius: 30px; width: 90%; max-width: 450px; position: relative; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 25px; cursor: pointer; color: #888; }

        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; text-align: left; }
        input, select { width: 100%; padding: 14px; margin-bottom: 20px; border-radius: 12px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<header>
    <div class="logo">HEPM <span>PREMIUM</span></div>
    <p style="color: #ccc; margin-top: 10px;">High Quality Ethiopian & Eritrean Products</p>
</header>

<div class="container">
    <div class="product-grid">
        <div class="product-card">
            <div class="product-img">🌾</div>
            <div class="product-info">
                <span class="origin">🇪🇷 Eritrean & 🇪🇹 Ethiopian</span>
                <h3>White Teff (ጻዕዳ ጣፍ)</h3>
                <p style="color: #777;">Very good, I like it! 100% Organic.</p>
                <button class="order-btn" onclick="openOrder('White Teff')">ORDER IN KILOS</button>
            </div>
        </div>

        <div class="product-card">
            <div class="product-img">🌶️</div>
            <div class="product-info">
                <span class="origin">Authentic Spices</span>
                <h3>Berbere (በርበረ)</h3>
                <p style="color: #777;">Traditional and spicy blend.</p>
                <button class="order-btn" onclick="openOrder('Berbere')">ORDER IN KILOS</button>
            </div>
        </div>
    </div>
</div>

<div id="order-modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeOrder()">&times;</span>
        <h2 id="modal-title" style="color: var(--gold); margin-bottom: 25px;">Order Details</h2>
        
        <label>Full Name / ምሉእ ስም</label>
        <input type="text" id="custName" placeholder="Your name...">

        <label>Weight (Kilo) / መጠን ብኪሎ</label>
        <select id="custWeight">
            <option value="1kg">1 Kilo</option>
            <option value="5kg">5 Kilo</option>
            <option value="10kg">10 Kilo</option>
            <option value="25kg">25 Kilo</option>
            <option value="50kg">50 Kilo</option>
        </select>

        <label>Phone Number / ተሌፎን</label>
        <input type="tel" id="custPhone" placeholder="+49 ...">

        <button class="order-btn" style="background: #25D366;" onclick="sendOrder()">
            SEND ORDER VIA WHATSAPP
        </button>
    </div>
</div>

<script>
    let selectedItem = "";

    function openOrder(item) {
        selectedItem = item;
        document.getElementById('modal-title').innerText = "Order: " + item;
        document.getElementById('order-modal').style.display = 'flex';
    }

    function closeOrder() {
        document.getElementById('order-modal').style.display = 'none';
    }

    function sendOrder() {
        const name = document.getElementById('custName').value;
        const weight = document.getElementById('custWeight').value;
        const phone = document.getElementById('custPhone').value;

        if(!name || !phone) { alert("Please fill all details!"); return; }

        // WhatsApp Message
        const msg = `*HEPM PREMIUM ORDER*%0A------------------%0A📦 *Product:* ${selectedItem}%0A⚖️ *Weight:* ${weight}%0A👤 *Customer:* ${name}%0A📞 *Phone:* ${phone}`;
        const myNum = "49123456789"; // ኣብዚ ቁጽሪ ተሌፎንካ ተካእዮ
        
        window.open(`https://wa.me/${myNum}?text=${msg}`, '_blank');
    }
</script>

</body>
</html>
