 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Uxbridge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans text-center">

    <div class="bg-yellow-400 text-black py-3 sticky top-0 z-[100] border-b-2 border-black font-black uppercase italic text-[10px]">
        ⚠️ NOTICE: Delivering in UXBRIDGE Only
    </div>

    <nav class="bg-white p-4 border-b flex justify-between items-center sticky top-[42px] z-50">
        <h1 class="text-xl font-black italic text-slate-800">HEPM-TECH</h1>
    </nav>

    <main class="max-w-6xl mx-auto p-4 md:p-10">
        <div id="productGrid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    </main>

    <div id="orderModal" class="hidden fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative overflow-y-auto max-h-[95vh]">
            <h2 id="modalTitle" class="text-2xl font-black text-slate-800 mb-6 uppercase italic text-center"></h2>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[9px] font-black uppercase text-slate-400 block text-center mb-1 tracking-widest">Select Weight & Price</label>
                    <select id="weightSelect" class="w-full p-4 bg-slate-50 rounded-2xl font-black border-2 border-slate-100 outline-none focus:border-blue-500"></select>
                </div>

                <input type="text" id="custName" placeholder="Full Name (ስም)" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                <input type="tel" id="custPhone" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-2xl font-bold border-none outline-none">
                
                <div class="space-y-2 pt-2 border-t border-slate-50">
                    <label class="text-[9px] font-black uppercase text-slate-400 block text-center">Delivery Address</label>
                    <input type="text" id="custStreet" placeholder="Street Name & House No." class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-400">
                    <input type="text" id="custPostcode" placeholder="Postcode (e.g. UB8...)" class="w-full p-4 bg-slate-100 rounded-2xl font-bold border-none outline-none focus:ring-2 focus:ring-blue-400 uppercase">
                </div>
                
                <button onclick="confirmAndSend()" class="w-full bg-slate-900 text-white p-5 rounded-3xl font-black uppercase shadow-xl hover:bg-blue-600 transition-all active:scale-95">
                    Order via WhatsApp <i class="fab fa-whatsapp ml-2 text-green-400"></i>
                </button>
                
                <button onclick="closeModal()" class="w-full text-slate-300 font-bold text-[10px] uppercase tracking-widest">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?output=csv';
        const MY_PHONE = "447448700978";
        let currentProduct = {};

        const MENU_DATA = {
            "rs11": ["3.5g - £40", "7g - £70", "14g - £130"],
            "candy": ["3.5g - £30", "7g - £55", "14g - £110"],
            "shenron": ["3.5g - £30", "7g - £60", "14g - £120"],
            "gelato": ["3.5g - £25", "7g - £50", "14g - £100"],
            "drysift": ["1g - £15", "2g - £25", "3g - £35", "4g - £40"],
            "triple": ["1g - £10", "2g - £20", "3.5g - £30"]
        };

        async function loadShop() {
            try {
                const response = await fetch(SHEET_URL);
                const data = await response.text();
                const rows = data.split('\n').slice(1);
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 1) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const img = cols[2] ? cols[2].replace(/"/g, '').trim() : '';
                        if(!name) return;
                        const card = document.createElement('div');
                        card.className = "bg-white rounded-[2rem] p-2 flex flex-col shadow-sm border border-slate-100";
                        card.innerHTML = `<div class="h-44 md:h-64 overflow-hidden rounded-[1.8rem] bg-slate-100 mb-3"><img src="${img}" class="w-full h-full object-cover"></div><h3 class="text-[10px] font-black uppercase text-slate-700 mb-3">${name}</h3><button onclick="openModal('${name}')" class="mt-auto w-full bg-slate-900 text-white py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest">Order</button>`;
                        grid.appendChild(card);
                    }
                });
            } catch (err) { console.error(err); }
        }

        function openModal(name) {
            currentProduct = { name };
            document.getElementById('modalTitle').innerText = name;
            const select = document.getElementById('weightSelect');
            select.innerHTML = '';
            const cleanName = name.toLowerCase().replace(/\s+/g, '');
            let keyFound = Object.keys(MENU_DATA).find(k => cleanName.includes(k));
            if(keyFound) {
                MENU_DATA[keyFound].forEach(opt => {
                    const o = document.createElement('option');
                    o.text = opt; o.value = opt;
                    select.add(o);
                });
            } else {
                const o = document.createElement('option');
                o.text = "Standard Order"; o.value = "Standard Order";
                select.add(o);
            }
            document.getElementById('orderModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('orderModal').classList.add('hidden'); }

        function confirmAndSend() {
            const name = document.getElementById('custName').value.trim();
            const phone = document.getElementById('custPhone').value.trim();
            const street = document.getElementById('custStreet').value.trim();
            const postcode = document.getElementById('custPostcode').value.trim();
            const weight = document.getElementById('weightSelect').value;

            if(!name || !phone || !street || !postcode) { 
                alert("Please fill in Name, Phone, Street and Postcode!"); 
                return; 
            }

            const msg = `*NEW ORDER* 📍\n--------------------------\n*Product:* ${currentProduct.name}\n*Selection:* ${weight}\n\n*Customer Info:*\n👤 Name: ${name}\n📞 Phone: ${phone}\n🏠 Street: ${street}\n📮 Postcode: ${postcode.toUpperCase()}\n--------------------------`;
            window.open(`https://wa.me/${MY_PHONE}?text=${encodeURIComponent(msg)}`, '_blank');
        }
        window.onload = loadShop;
    </script>
</body>
</html>
