 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM FAMILY | Auto Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen p-4">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <div class="flex justify-between items-center bg-[#111] p-6 rounded-[2rem] border border-white/5 shadow-xl">
            <h1 class="text-xl font-black italic text-green-500 uppercase">HEPM FAMILY AUTO-LOG</h1>
            <button onclick="resetAllData()" class="text-[9px] bg-red-500/10 text-red-500 px-4 py-2 rounded-full font-bold uppercase hover:bg-red-500 hover:text-white transition-all">Clear All Data</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-1 bg-[#111] p-6 rounded-[2.5rem] border border-white/5 space-y-4">
                <h2 class="text-[10px] font-black uppercase text-slate-500 tracking-widest border-b border-white/5 pb-2">New Sale</h2>
                
                <div class="space-y-3">
                    <label class="block text-[10px] text-slate-500 uppercase">Grams Sold</label>
                    <input type="number" id="saleWeight" placeholder="e.g. 3.5" class="w-full bg-black p-4 rounded-2xl font-black text-white border border-white/5 outline-none focus:border-green-500">
                    
                    <label class="block text-[10px] text-slate-500 uppercase">Money Received (£)</label>
                    <input type="number" id="salePrice" placeholder="e.g. 40" class="w-full bg-black p-4 rounded-2xl font-black text-green-500 border border-white/5 outline-none focus:border-green-500">
                </div>

                <button onclick="saveSale()" class="w-full bg-green-600 text-white p-5 rounded-3xl font-black uppercase tracking-widest shadow-lg shadow-green-600/20 hover:scale-[1.02] active:scale-95 transition-all mt-4">
                    Save Sale ✅
                </button>
            </div>

            <div class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <div class="bg-[#111] p-6 rounded-[2.5rem] border border-blue-500/20 flex flex-col justify-center text-center">
                    <span class="text-[10px] font-black uppercase text-blue-400 tracking-widest">Remaining Stock</span>
                    <div id="displayStock" class="text-5xl font-black mt-2">10,000g</div>
                    <div class="w-full bg-white/5 h-2 rounded-full mt-4 overflow-hidden">
                        <div id="stockBar" class="bg-blue-500 h-full w-full transition-all duration-1000"></div>
                    </div>
                </div>

                <div class="bg-[#111] p-6 rounded-[2.5rem] border border-yellow-500/20 flex flex-col justify-center text-center">
                    <span class="text-[10px] font-black uppercase text-yellow-500 tracking-widest">Total Revenue</span>
                    <div id="totalRevenue" class="text-5xl font-black mt-2 text-white">£0</div>
                    <p class="text-[9px] text-slate-500 mt-2 uppercase">Total Cash Collected</p>
                </div>

                <div class="md:col-span-2 bg-white/5 p-6 rounded-[2.5rem] grid grid-cols-3 gap-4 text-center">
                    <div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">Today</span>
                        <div id="statToday" class="text-xl font-black text-green-500">£0</div>
                    </div>
                    <div class="border-x border-white/10">
                        <span class="text-[9px] font-bold text-slate-500 uppercase">This Week</span>
                        <div id="statWeek" class="text-xl font-black text-white">£0</div>
                    </div>
                    <div>
                        <span class="text-[9px] font-bold text-slate-500 uppercase">This Month</span>
                        <div id="statMonth" class="text-xl font-black text-white">£0</div>
                    </div>
                </div>
            </div>

        </div>

        <button onclick="location.href='index.html'" class="w-full text-center text-slate-600 font-bold text-[10px] uppercase tracking-[0.5em] py-10 hover:text-green-500 transition-all italic">
            ← BACK TO SHOP
        </button>
    </div>

    <script>
        // Load data from LocalStorage (it stays even if you refresh)
        let data = JSON.parse(localStorage.getItem('hepm_data')) || {
            stock: 10000,
            revenue: 0,
            today: 0,
            week: 0,
            month: 0,
            lastReset: new Date().toDateString()
        };

        function updateUI() {
            document.getElementById('displayStock').innerText = data.stock.toLocaleString() + 'g';
            document.getElementById('totalRevenue').innerText = '£' + data.revenue.toLocaleString();
            document.getElementById('statToday').innerText = '£' + data.today.toLocaleString();
            document.getElementById('statWeek').innerText = '£' + data.week.toLocaleString();
            document.getElementById('statMonth').innerText = '£' + data.month.toLocaleString();
            
            let percent = (data.stock / 10000) * 100;
            document.getElementById('stockBar').style.width = percent + '%';
            
            localStorage.setItem('hepm_data', JSON.stringify(data));
        }

        function saveSale() {
            const weight = parseFloat(document.getElementById('saleWeight').value) || 0;
            const price = parseFloat(document.getElementById('salePrice').value) || 0;

            if (weight <= 0 || price <= 0) {
                alert("Enter correct weight and price!");
                return;
            }

            // Calculations
            data.stock -= weight;
            data.revenue += price;
            data.today += price;
            data.week += price;
            data.month += price;

            // Clear inputs
            document.getElementById('saleWeight').value = '';
            document.getElementById('salePrice').value = '';

            updateUI();
        }

        function resetAllData() {
            if(confirm("Are you sure? This will reset all your stock and history!")) {
                data = { stock: 10000, revenue: 0, today: 0, week: 0, month: 0, lastReset: new Date().toDateString() };
                updateUI();
            }
        }

        // Auto-reset "Today" if date changed
        if (data.lastReset !== new Date().toDateString()) {
            data.today = 0;
            data.lastReset = new Date().toDateString();
            updateUI();
        }

        window.onload = updateUI;
    </script>
</body>
</html>
