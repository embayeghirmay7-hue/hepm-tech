 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEPM-TECH | Official Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-card:hover img { transform: scale(1.1); }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <header class="sticky top-0 z-50 glass shadow-sm border-b border-gray-100 p-4">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 w-12 h-12 rounded-2xl flex items-center justify-center shadow-lg rotate-3">
                    <i class="fas fa-store text-white text-xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-black tracking-tighter italic text-blue-900 leading-none uppercase">HEPM-TECH</h1>
                    <span class="text-[10px] font-bold uppercase tracking-widest text-blue-500">Premium Catalog</span>
                </div>
            </div>
            <div class="relative w-full md:w-80">
                <input type="text" id="searchInput" onkeyup="searchMenu()" placeholder="Search product..." 
                       class="w-full p-3 pl-10 rounded-2xl border border-gray-200 outline-none focus:ring-2 focus:ring-blue-500 transition-all font-bold text-sm">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
        <div id="menuGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-8">
            </div>
    </main>

    <script>
        // UPDATED LINK
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQH4oZK0msDak510wlcSWZf0Oo39Ncj3pZsSZkU2YhO4XnSEH6F6UrX9AqmBKHSiMRBcXzNodNb0hzR/pub?gid=0&single=true&output=csv';

        async function fetchMenu() {
            try {
                const res = await fetch(SHEET_URL);
                const text = await res.text();
                const rows = text.split(/\r?\n/); 
                const grid = document.getElementById('menuGrid');
                grid.innerHTML = '';

                rows.forEach((row, index) => {
                    if (index === 0) return; // Skip Header

                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 2) {
                        const name = cols[0].replace(/"/g, '').trim();
                        const price = cols[1] ? cols[1].replace(/"/g, '').trim() : "0.00";
                        const photo = cols[2] ? cols[2].replace(/"/g, '').trim() : 'https://via.placeholder.com/400x400?text=HEPM-TECH';
                        const category = cols[3] ? cols[3].replace(/"/g, '').trim() : 'General';

                        if(!name) return;

                        const card = document.createElement('div');
                        card.className = "product-card bg-white rounded-[2rem] shadow-sm border border-gray-100 overflow-hidden transition-all duration-500 hover:shadow-2xl flex flex-col";
                        card.innerHTML = `
                            <div class="h-40 md:h-56 overflow-hidden relative">
                                <img src="${photo}" class="w-full h-full object-cover transition-transform duration-700" onerror="this.src='https://via.placeholder.com/400x400?text=${name}'">
                                <div class="absolute top-3 left-3 bg-white/80 backdrop-blur-sm text-blue-600 text-[9px] px-3 py-1 rounded-full font-black uppercase">
                                    ${category}
                                </div>
                            </div>
                            <div class="p-4 flex flex-col flex-grow">
                                <h3 class="text-gray-800 font-black text-xs md:text-sm uppercase mb-2 leading-tight h-10 overflow-hidden">${name}</h3>
                                <div class="mt-auto flex justify-between items-center">
                                    <span class="text-blue-600 font-black text-lg italic">€${price}</span>
                                    <button onclick="orderViaWhatsApp('${name}', '${price}')" class="bg-blue-600 text-white p-2 md:px-4 md:py-2 rounded-xl hover:bg-black transition-colors shadow-lg shadow-blue-100 text-[10px] font-bold">
                                        <i class="fas fa-plus"></i> <span class="hidden md:inline">ADD</span>
                                    </button>
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (e) { 
                console.error("Error loading CSV");
                document.getElementById('menuGrid').innerHTML = "<p class='text-center col-span-full font-bold text-red-500'>Error loading data. Check CSV publish settings.</p>";
            }
        }

        function orderViaWhatsApp(name, price) {
            const phoneNumber = "49176XXXXXXX"; // Replace with your phone number
            const message = `Hello HEPM-TECH, I want to order: ${name} for €${price}`;
            window.open(`https://wa.me/${phoneNumber}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function searchMenu() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let cards = document.getElementsByClassName("product-card");
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].querySelector("h3").innerText;
                cards[i].style.display = name.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }

        window.onload = fetchMenu;
    </script>
</body>
</html>
